name: Harness CI

on:
  push:
    branches:
      - main
      - master
      - release/**
  pull_request:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@v3
      - name: Sync project dependencies
        run: uv sync --extra dev
      - name: Run Harness check
        run: python scripts/check.py
