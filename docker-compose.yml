services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid-agent-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - QWEN_OMNI_API_KEY=${QWEN_OMNI_API_KEY}
      - QWEN_OMNI_BASE_URL=${QWEN_OMNI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - TONGYI_EMBEDDING_API_KEY=${TONGYI_EMBEDDING_API_KEY}
      - TONGYI_EMBEDDING_BASE_URL=${TONGYI_EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - API_KEY=${API_KEY:-your-api-key-here}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8501,http://frontend,http://localhost:5173}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/hybrid_agent}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me}
      - PROVIDER_SECRET_KEY=${PROVIDER_SECRET_KEY:-change-me-provider-key}
      - EMBEDDING_BACKEND=${EMBEDDING_BACKEND:-sentence_transformers}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
      - PROMETHEUS_METRICS_PATH=${PROMETHEUS_METRICS_PATH:-/metrics}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        API_UPSTREAM: ${API_UPSTREAM:-http://api:8000}
    container_name: hybrid-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - default

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid-agent-web
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - API_BASE_URL=http://api:8000
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: hybrid-agent-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=hybrid_agent
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hybrid_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: hybrid-agent-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.1
    container_name: hybrid-agent-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    container_name: hybrid-agent-backup
    environment:
      - PGPASSWORD=postgres
    command:
      - /bin/sh
      - -c
      - while true; do ts=$$(date +%Y%m%d_%H%M%S); pg_dump -h postgres -U postgres -d hybrid_agent > /backup/hybrid_agent_$${ts}.sql && find /backup -type f -name '*.sql' -mtime +7 -delete; sleep 86400; done
    volumes:
      - backup_data:/backup
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: hybrid-agent-network
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
  backup_data:
